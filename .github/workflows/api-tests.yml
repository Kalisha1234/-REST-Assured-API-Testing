name: API Tests CI/CD Pipeline

permissions:
  contents: write

on:
  push:
    branches: [ main]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  api-tests:
    runs-on: ubuntu-latest

    steps:
      # Checkout source code
      - name: Checkout repository
        uses: actions/checkout@v4

      # Setup Java
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # Run API tests
      - name: Run API Tests
        id: test
        run: mvn clean test -B
        continue-on-error: true

      # Extract test results
      - name: Extract Test Results
        id: test_results
        if: always()
        run: |
          if [ -f target/surefire-reports/TEST-TestSuite.xml ]; then
            TESTS=$(grep -oP 'tests="\K[0-9]+' target/surefire-reports/TEST-TestSuite.xml | head -1)
            FAILURES=$(grep -oP 'failures="\K[0-9]+' target/surefire-reports/TEST-TestSuite.xml | head -1)
            ERRORS=$(grep -oP 'errors="\K[0-9]+' target/surefire-reports/TEST-TestSuite.xml | head -1)
            SKIPPED=$(grep -oP 'skipped="\K[0-9]+' target/surefire-reports/TEST-TestSuite.xml | head -1)
            PASSED=$((TESTS - FAILURES - ERRORS - SKIPPED))
          else
            TESTS=0
            FAILURES=0
            ERRORS=0
            SKIPPED=0
            PASSED=0
          fi
          echo "tests=$TESTS" >> $GITHUB_OUTPUT
          echo "failures=$FAILURES" >> $GITHUB_OUTPUT
          echo "errors=$ERRORS" >> $GITHUB_OUTPUT
          echo "skipped=$SKIPPED" >> $GITHUB_OUTPUT
          echo "passed=$PASSED" >> $GITHUB_OUTPUT
          
          if [ $FAILURES -eq 0 ] && [ $ERRORS -eq 0 ]; then
            echo "status=success" >> $GITHUB_OUTPUT
            echo "status_icon=✅" >> $GITHUB_OUTPUT
            echo "status_text=Build Successful" >> $GITHUB_OUTPUT
          else
            echo "status=failure" >> $GITHUB_OUTPUT
            echo "status_icon=❌" >> $GITHUB_OUTPUT
            echo "status_text=Build Failed" >> $GITHUB_OUTPUT
          fi

      # Install Allure
      - name: Install Allure
        if: always()
        run: |
          curl -o allure-2.25.0.tgz -L https://github.com/allure-framework/allure2/releases/download/2.25.0/allure-2.25.0.tgz
          tar -zxvf allure-2.25.0.tgz
          sudo mv allure-2.25.0 /opt/allure
          sudo ln -s /opt/allure/bin/allure /usr/bin/allure

      # Generate Allure Report
      - name: Generate Allure Report
        if: always()
        run: allure generate target/allure-results -o allure-report --clean

      # Deploy Allure report to GitHub Pages
      - name: Deploy report to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-report

      # Upload Allure results as artifact
      - name: Upload Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: target/allure-results/
          retention-days: 30

      # Upload Surefire reports
      - name: Upload Surefire Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports/
          retention-days: 30

      # Slack Notification
      - name: Slack Notification
        if: always()
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ steps.test_results.outputs.status }}
          text: |
            ${{ steps.test_results.outputs.status_icon }} ${{ steps.test_results.outputs.status_text }}
            All tests passed successfully
            
            Repository: ${{ github.repository }}
            
            Test Summary:
            - Tests Run: ${{ steps.test_results.outputs.tests }}
            - Passed: ${{ steps.test_results.outputs.passed }}
            - Failures: ${{ steps.test_results.outputs.failures }}
            - Skipped: ${{ steps.test_results.outputs.skipped }}
          fields: repo,message,commit,author,action,eventName,ref,workflow
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      # Email Notification
      - name: Send Email Notification
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "${{ steps.test_results.outputs.status_icon }} ${{ steps.test_results.outputs.status_text }} - ${{ github.repository }}"
          to: ${{ secrets.EMAIL_TO }}
          from: GitHub Actions
          body: |
            ${{ steps.test_results.outputs.status_icon }} ${{ steps.test_results.outputs.status_text }}
            All tests passed successfully
            
            Repository: ${{ github.repository }}
            Branch: ${{ github.ref }}
            Commit: ${{ github.sha }}
            Author: ${{ github.actor }}
            
            Test Summary:
            - Tests Run: ${{ steps.test_results.outputs.tests }}
            - Passed: ${{ steps.test_results.outputs.passed }}
            - Failures: ${{ steps.test_results.outputs.failures }}
            - Skipped: ${{ steps.test_results.outputs.skipped }}
            
            View Full Execution: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}